name: Deploy Render (agent-api)

on:
  push:
    branches: [main]
    paths:
      - 'scripts/**'
      - 'render.yaml'
      - 'package.json'
      - 'package-lock.json'
  workflow_dispatch:

jobs:
  trigger-render:
    runs-on: ubuntu-latest
    steps:
      - name: Disparar deploy no Render (se hook configurado)
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "RENDER_DEPLOY_HOOK_URL não configurado — crie o serviço no Render e adicione o secret no GitHub."
            exit 0
          fi
          curl -fsS -X POST "$RENDER_DEPLOY_HOOK_URL"
