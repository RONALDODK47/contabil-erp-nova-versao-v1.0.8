name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VITE_BASE_PATH: /contabil-erp-nova-versao-v1.0.8/v1.0.8/
      VITE_STORAGE_BACKEND: supabase
      VITE_AGENT_API_URL: https://eye-vision-agent-api.onrender.com/api/agent
      VITE_FISCAL_API_URL: https://eye-vision-agent-api.onrender.com/api/fiscal-nfe
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build frontend
        run: npm run build

      - name: Organizar pastas para GitHub Pages (/v1.0.8/)
        run: |
          mkdir -p dist/v1.0.8
          for item in index.html assets data _redirects; do
            if [ -e "dist/$item" ]; then mv "dist/$item" "dist/v1.0.8/"; fi
          done
          cp "dist/v1.0.8/index.html" "dist/v1.0.8/404.html"
          printf '%s\n' '<!doctype html><html><head><meta charset="utf-8"><meta http-equiv="refresh" content="0;url=v1.0.8/"><title>Contábil ERP Nova Versão v1.0.8</title></head><body><p><a href="v1.0.8/">Contábil ERP Nova Versão v1.0.8</a></p></body></html>' > dist/index.html

      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          cname: false
